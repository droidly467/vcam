name: "Build VCam deb"

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: "ubuntu-latest"
    timeout-minutes: 30

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"

      - name: "Install deps"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential fakeroot dpkg git curl rsync perl

      - name: "Install Theos"
        run: |
          set -e
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"
          echo "$HOME/theos/bin" >> "$GITHUB_PATH"

      - name: "Install SDK"
        run: |
          set -e
          cd "$HOME/theos/sdks"
          curl -sLO https://github.com/theos/sdks/archive/master.zip
          unzip -q master.zip
          mv sdks-master/*.sdk . 2>/dev/null || true
          rm -rf sdks-master master.zip
          echo "SDKs:"
          ls *.sdk || echo "none"

      - name: "Build package"
        run: |
          set -e
          export THEOS="$HOME/theos"
          export PATH="$THEOS/bin:$PATH"
          make clean || true
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          echo "=== Output ==="
          ls -la packages/

      - name: "Upload deb"
        uses: "actions/upload-artifact@v4"
        with:
          name: "vcam-deb"
          path: "packages/*.deb"
          retention-days: 90
